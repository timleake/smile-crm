<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Smile CRM</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🙂</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background:#f6f7f9; }
    .scroll-thin::-webkit-scrollbar{height:10px;width:10px}
    .scroll-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}
  </style>
</head>
<body>
  <div id="root" class="text-slate-800"></div>

  <script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;

// ---- Supabase client (publishable key is safe in the browser; RLS guards data) ----
const SUPABASE_URL = "https://awzjnxejacoflwsqvrmr.supabase.co";
const SUPABASE_KEY = "sb_publishable_02ogxC6Z2Yb5Qx9moQVUew_ow_hCMXI";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const fmtDate = (s) => s ? new Date(s).toLocaleString(undefined,{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}) : '';
const fmtDay  = (s) => s ? new Date(s).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}) : '';
const money   = (n) => (n||n===0) ? '$'+Number(n).toLocaleString() : '';

// =====================================================================
// Auth gate
// =====================================================================
function Auth() {
  const [email,setEmail] = useState('');
  const [pw,setPw] = useState('');
  const [mode,setMode] = useState('signin');
  const [msg,setMsg] = useState('');
  const [busy,setBusy] = useState(false);

  async function submit(e){
    e.preventDefault(); setBusy(true); setMsg('');
    try{
      if(mode==='signin'){
        const {error} = await db.auth.signInWithPassword({email,password:pw});
        if(error) throw error;
      } else {
        const {error} = await db.auth.signUp({email,password:pw});
        if(error) throw error;
        setMsg('Account created. If sign-in is blocked, ask Tim/Claude to confirm it, then sign in.');
        setMode('signin');
      }
    }catch(err){ setMsg(err.message||String(err)); }
    setBusy(false);
  }

  return (
    <div className="min-h-screen flex items-center justify-center p-4">
      <form onSubmit={submit} className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 w-full max-w-sm">
        <div className="text-3xl text-center mb-1">🙂</div>
        <h1 className="text-xl font-semibold text-center mb-6">Smile CRM</h1>
        <label className="block text-sm text-slate-600 mb-1">Email</label>
        <input className="w-full border border-slate-300 rounded-lg px-3 py-2 mb-3" type="email" value={email} onChange={e=>setEmail(e.target.value)} required />
        <label className="block text-sm text-slate-600 mb-1">Password</label>
        <input className="w-full border border-slate-300 rounded-lg px-3 py-2 mb-4" type="password" value={pw} onChange={e=>setPw(e.target.value)} required />
        <button disabled={busy} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg py-2 font-medium disabled:opacity-50">
          {busy?'…':(mode==='signin'?'Sign in':'Create account')}
        </button>
        {msg && <p className="text-sm text-amber-700 mt-3">{msg}</p>}
        <p className="text-sm text-slate-500 mt-4 text-center">
          {mode==='signin'
            ? <>First time? <button type="button" className="text-indigo-600" onClick={()=>setMode('signup')}>Create account</button></>
            : <>Have an account? <button type="button" className="text-indigo-600" onClick={()=>setMode('signin')}>Sign in</button></>}
        </p>
      </form>
    </div>
  );
}

// =====================================================================
// Top level
// =====================================================================
function App(){
  const [session,setSession] = useState(undefined);
  useEffect(()=>{
    db.auth.getSession().then(({data})=>setSession(data.session));
    const {data:sub} = db.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);
  if(session===undefined) return <div className="min-h-screen flex items-center justify-center text-slate-400">Loading…</div>;
  if(!session) return <Auth/>;
  return <Main/>;
}

function Main(){
  const [view,setView] = useState('pipeline');
  const [statuses,setStatuses] = useState([]);
  const [leads,setLeads] = useState([]);
  const [openLead,setOpenLead] = useState(null);
  const [unsortedCount,setUnsortedCount] = useState(0);
  const [search,setSearch] = useState('');
  const [loading,setLoading] = useState(true);

  const load = useCallback(async ()=>{
    setLoading(true);
    const [{data:st},{data:ld},{count}] = await Promise.all([
      db.from('crm_lead_statuses').select('*').order('sort_order'),
      db.from('crm_leads').select('*, status:crm_lead_statuses(*), crm_contacts(id,name), crm_opportunities(id,name,value,status)').order('updated_at',{ascending:false}),
      db.from('crm_unsorted_emails').select('*',{count:'exact',head:true}).eq('resolved',false),
    ]);
    setStatuses(st||[]); setLeads(ld||[]); setUnsortedCount(count||0); setLoading(false);
  },[]);
  useEffect(()=>{ load(); },[load]);

  const filtered = leads.filter(l=> !search || l.name.toLowerCase().includes(search.toLowerCase()));

  return (
    <div className="min-h-screen flex flex-col">
      <header className="bg-white border-b border-slate-200 px-4 py-2.5 flex items-center gap-3 sticky top-0 z-20">
        <div className="text-xl">🙂</div>
        <div className="font-semibold mr-2">Smile CRM</div>
        <nav className="flex gap-1 text-sm">
          {[['pipeline','Pipeline'],['list','Leads'],['unsorted','Unsorted'+(unsortedCount?` (${unsortedCount})`:'')]].map(([k,label])=>(
            <button key={k} onClick={()=>setView(k)}
              className={"px-3 py-1.5 rounded-lg "+(view===k?'bg-indigo-50 text-indigo-700 font-medium':'text-slate-600 hover:bg-slate-100')}>{label}</button>
          ))}
        </nav>
        <div className="flex-1" />
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search leads…"
          className="border border-slate-300 rounded-lg px-3 py-1.5 text-sm w-44 focus:w-60 transition-all" />
        <button onClick={async()=>{
            const name = prompt('New lead — company name?'); if(!name) return;
            const def = statuses[0]?.id;
            const {data} = await db.from('crm_leads').insert({name,status_id:def}).select('*, status:crm_lead_statuses(*)').single();
            await load(); setOpenLead(data);
          }} className="bg-indigo-600 hover:bg-indigo-700 text-white text-sm rounded-lg px-3 py-1.5 font-medium">+ Lead</button>
        <button onClick={()=>db.auth.signOut()} className="text-slate-400 hover:text-slate-600 text-sm px-2">Sign out</button>
      </header>

      <main className="flex-1 min-h-0">
        {loading ? <div className="p-10 text-center text-slate-400">Loading…</div>
         : view==='pipeline' ? <Pipeline statuses={statuses} leads={filtered} onOpen={setOpenLead} onChange={load}/>
         : view==='list' ? <LeadList leads={filtered} onOpen={setOpenLead}/>
         : <Unsorted leads={leads} onChange={load}/>}
      </main>

      {openLead && <LeadDetail leadId={openLead.id} statuses={statuses} onClose={()=>setOpenLead(null)} onChange={load}/>}
    </div>
  );
}

// =====================================================================
// Pipeline board
// =====================================================================
function Pipeline({statuses,leads,onOpen,onChange}){
  async function move(lead,status_id){ await db.from('crm_leads').update({status_id}).eq('id',lead.id); onChange(); }
  return (
    <div className="h-full overflow-x-auto scroll-thin p-4">
      <div className="flex gap-4 min-w-max h-full">
        {statuses.map(s=>{
          const col = leads.filter(l=>l.status_id===s.id);
          return (
            <div key={s.id} className="w-72 flex-shrink-0 flex flex-col">
              <div className="flex items-center justify-between px-1 mb-2">
                <div className="font-medium text-sm flex items-center gap-2">
                  <span className={"w-2 h-2 rounded-full "+(s.kind==='won'?'bg-emerald-500':s.kind==='lost'?'bg-rose-400':'bg-indigo-400')}></span>
                  {s.label}
                </div>
                <span className="text-xs text-slate-400">{col.length}</span>
              </div>
              <div className="flex-1 space-y-2 overflow-y-auto scroll-thin pr-1">
                {col.map(l=>(
                  <div key={l.id} onClick={()=>onOpen(l)}
                    className="bg-white rounded-xl border border-slate-200 p-3 cursor-pointer hover:border-indigo-300 hover:shadow-sm">
                    <div className="font-medium text-sm">{l.name}</div>
                    <div className="text-xs text-slate-500 mt-0.5">
                      {(l.crm_contacts?.length||0)} contact{l.crm_contacts?.length===1?'':'s'}
                      {l.crm_opportunities?.length ? ' · '+l.crm_opportunities.length+' opp' : ''}
                    </div>
                    <select value={l.status_id} onClick={e=>e.stopPropagation()} onChange={e=>move(l,e.target.value)}
                      className="mt-2 text-xs border border-slate-200 rounded-md px-1.5 py-1 w-full text-slate-600">
                      {statuses.map(o=><option key={o.id} value={o.id}>{o.label}</option>)}
                    </select>
                  </div>
                ))}
                {col.length===0 && <div className="text-xs text-slate-300 px-1 py-4 text-center">—</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// =====================================================================
// Lead list
// =====================================================================
function LeadList({leads,onOpen}){
  return (
    <div className="p-4 max-w-4xl mx-auto">
      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-slate-500 text-left">
            <tr><th className="px-4 py-2 font-medium">Company</th><th className="px-4 py-2 font-medium">Status</th><th className="px-4 py-2 font-medium">Contacts</th><th className="px-4 py-2 font-medium">Updated</th></tr>
          </thead>
          <tbody>
            {leads.map(l=>(
              <tr key={l.id} onClick={()=>onOpen(l)} className="border-t border-slate-100 hover:bg-slate-50 cursor-pointer">
                <td className="px-4 py-2.5 font-medium">{l.name}</td>
                <td className="px-4 py-2.5"><span className="text-xs bg-slate-100 rounded px-2 py-0.5">{l.status?.label||'—'}</span></td>
                <td className="px-4 py-2.5 text-slate-500">{l.crm_contacts?.length||0}</td>
                <td className="px-4 py-2.5 text-slate-400">{fmtDay(l.updated_at)}</td>
              </tr>
            ))}
            {leads.length===0 && <tr><td colSpan="4" className="px-4 py-10 text-center text-slate-300">No leads yet. Hit “+ Lead”.</td></tr>}
          </tbody>
        </table>
      </div>
    </div>

// =====================================================================
// Lead detail slide-over
// =====================================================================
function LeadDetail({leadId,statuses,onClose,onChange}){
  const [lead,setLead] = useState(null);
  const [tab,setTab] = useState('timeline');

  const load = useCallback(async ()=>{
    const {data} = await db.from('crm_leads')
      .select('*, status:crm_lead_statuses(*), crm_contacts(*, crm_contact_emails(*)), crm_opportunities(*)')
      .eq('id',leadId).single();
    setLead(data);
  },[leadId]);
  useEffect(()=>{ load(); },[load]);

  async function patch(fields){ await db.from('crm_leads').update(fields).eq('id',leadId); await load(); onChange(); }

  if(!lead) return <Drawer onClose={onClose}><div className="p-6 text-slate-400">Loading…</div></Drawer>;

  return (
    <Drawer onClose={onClose}>
      <div className="p-5 border-b border-slate-200">
        <input defaultValue={lead.name} onBlur={e=>e.target.value!==lead.name && patch({name:e.target.value})}
          className="text-lg font-semibold w-full outline-none" />
        <div className="flex items-center gap-2 mt-2">
          <select value={lead.status_id||''} onChange={e=>patch({status_id:e.target.value})}
            className="text-sm border border-slate-300 rounded-lg px-2 py-1">
            {statuses.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
          </select>
          <input defaultValue={lead.website||''} placeholder="website" onBlur={e=>e.target.value!==(lead.website||'')&&patch({website:e.target.value})}
            className="text-sm border border-slate-200 rounded-lg px-2 py-1 flex-1" />
        </div>
        <textarea defaultValue={lead.description||''} placeholder="Notes about this company…" onBlur={e=>e.target.value!==(lead.description||'')&&patch({description:e.target.value})}
          className="text-sm border border-slate-200 rounded-lg px-2 py-1.5 mt-2 w-full resize-none" rows="2" />
      </div>

      <div className="flex border-b border-slate-200 text-sm">
        {[['timeline','Timeline'],['contacts','Contacts'],['opps','Opportunities']].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} className={"px-4 py-2.5 "+(tab===k?'border-b-2 border-indigo-600 text-indigo-700 font-medium':'text-slate-500')}>{l}</button>
        ))}
      </div>

      <div className="flex-1 overflow-y-auto scroll-thin">
        {tab==='timeline' && <Timeline lead={lead} onChange={load}/>}
        {tab==='contacts' && <Contacts lead={lead} onChange={load}/>}
        {tab==='opps' && <Opps lead={lead} onChange={load}/>}
      </div>
    </Drawer>
  );
}

function Drawer({children,onClose}){
  return (
    <div className="fixed inset-0 z-30 flex justify-end">
      <div className="absolute inset-0 bg-black/20" onClick={onClose}></div>
      <div className="relative bg-white w-full max-w-xl h-full shadow-xl flex flex-col">
        <button onClick={onClose} className="absolute -left-9 top-3 text-white/90 text-2xl hidden sm:block">×</button>
        {children}
      </div>
    </div>
  );
}

// ---- Timeline (notes / emails / tasks) ----
function Timeline({lead,onChange}){
  const [items,setItems] = useState([]);
  const [mode,setMode] = useState('note');
  const [body,setBody] = useState('');
  const [due,setDue] = useState('');
  const [pending,setPending] = useState([]); // pasted images not yet saved
  const [busy,setBusy] = useState(false);
  const fileRef = useRef();

  const load = useCallback(async ()=>{
    const {data} = await db.from('crm_activities')
      .select('*, crm_attachments(*)').eq('lead_id',lead.id).order('occurred_at',{ascending:false});
    setItems(data||[]);
  },[lead.id]);
  useEffect(()=>{ load(); },[load]);

  async function uploadFile(file){
    const path = `${lead.id}/${Date.now()}-${Math.round(Math.random()*1e6)}-${(file.name||'paste.png').replace(/[^\w.\-]/g,'_')}`;
    const {error} = await db.storage.from('crm-attachments').upload(path,file,{contentType:file.type||'image/png'});
    if(error){ alert('Upload failed: '+error.message); return null; }
    return {storage_path:path, filename:file.name||'pasted-image.png', content_type:file.type||'image/png', size_bytes:file.size};
  }

  function onPaste(e){
    const imgs = [...(e.clipboardData?.items||[])].filter(i=>i.type.startsWith('image/'));
    if(imgs.length){ e.preventDefault(); imgs.forEach(async i=>{ const f=i.getAsFile(); if(f){ const a=await uploadFile(f); if(a) setPending(p=>[...p,a]); } }); }
  }
  async function onPick(e){ for(const f of e.target.files){ const a=await uploadFile(f); if(a) setPending(p=>[...p,a]); } e.target.value=''; }

  async function save(){
    if(!body.trim() && pending.length===0 && mode!=='task') return;
    if(mode==='task' && !body.trim()) return;
    setBusy(true);
    const row = { lead_id:lead.id, type:mode, body:body.trim()||null, occurred_at:new Date().toISOString() };
    if(mode==='task' && due) row.task_due_date = due;
    const {data:act} = await db.from('crm_activities').insert(row).select('id').single();
    if(act && pending.length){
      await db.from('crm_attachments').insert(pending.map(a=>({...a,activity_id:act.id})));
    }
    setBody(''); setDue(''); setPending([]); setBusy(false);
    await load(); onChange();
  }

  async function toggleTask(it){
    await db.from('crm_activities').update({task_done:!it.task_done, task_done_at: it.task_done?null:new Date().toISOString()}).eq('id',it.id);
    load();
  }
  async function del(it){ if(confirm('Delete this entry?')){ await db.from('crm_activities').delete().eq('id',it.id); load(); onChange(); } }

  const icon = {note:'📝',email:'✉️',task:'✅'};

  return (
    <div className="p-4">
      {/* composer */}
      <div className="border border-slate-200 rounded-xl p-3 mb-4 bg-slate-50/50">
        <div className="flex gap-1 mb-2 text-sm">
          {[['note','Note'],['task','Task']].map(([k,l])=>(
            <button key={k} onClick={()=>setMode(k)} className={"px-2.5 py-1 rounded-md "+(mode===k?'bg-white border border-slate-300 font-medium':'text-slate-500')}>{l}</button>
          ))}
        </div>
        <textarea value={body} onChange={e=>setBody(e.target.value)} onPaste={onPaste}
          placeholder={mode==='task'?'Task — what needs doing?':'Write a note… (paste a screenshot to attach)'}
          className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm resize-none" rows="3" />
        {pending.length>0 && <div className="flex gap-2 flex-wrap mt-2">{pending.map((a,i)=><span key={i} className="text-xs bg-indigo-50 text-indigo-700 rounded px-2 py-1">📎 {a.filename}</span>)}</div>}
        <div className="flex items-center gap-2 mt-2">
          {mode==='task' && <input type="date" value={due} onChange={e=>setDue(e.target.value)} className="text-sm border border-slate-200 rounded-lg px-2 py-1" />}
          <button onClick={()=>fileRef.current.click()} className="text-sm text-slate-500 hover:text-slate-700">📎 Attach</button>
          <input ref={fileRef} type="file" multiple accept="image/*" className="hidden" onChange={onPick} />
          <div className="flex-1" />
          <button onClick={save} disabled={busy} className="bg-indigo-600 hover:bg-indigo-700 text-white text-sm rounded-lg px-3 py-1.5 font-medium disabled:opacity-50">{busy?'Saving…':'Add'}</button>
        </div>
      </div>

      {/* feed */}
      <div className="space-y-3">
        {items.map(it=>(
          <div key={it.id} className="flex gap-3 group">
            <div className="text-lg leading-none mt-0.5">{icon[it.type]}</div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 text-xs text-slate-400">
                <span className="capitalize">{it.type}</span><span>·</span><span>{fmtDate(it.occurred_at)}</span>
                {it.type==='task' && <label className="flex items-center gap-1 ml-1 text-slate-500"><input type="checkbox" checked={it.task_done} onChange={()=>toggleTask(it)} />{it.task_done?'done':(it.task_due_date?('due '+fmtDay(it.task_due_date)):'open')}</label>}
                <button onClick={()=>del(it)} className="ml-auto opacity-0 group-hover:opacity-100 text-slate-300 hover:text-rose-500">delete</button>
              </div>
              {it.type==='email' && it.email_subject && <div className="text-sm font-medium mt-0.5">{it.email_subject}</div>}
              {it.type==='email' && <div className="text-xs text-slate-400">{it.email_from} {it.email_direction==='outbound'?'→':'←'} {it.email_to}</div>}
              {it.body && <div className={"text-sm whitespace-pre-wrap mt-0.5 "+(it.task_done?'line-through text-slate-400':'')}>{it.body}</div>}
              {it.crm_attachments?.length>0 && <div className="flex gap-2 flex-wrap mt-2">{it.crm_attachments.map(a=><Attachment key={a.id} a={a}/>)}</div>}
            </div>
          </div>
        ))}
        {items.length===0 && <div className="text-center text-slate-300 py-8 text-sm">No activity yet.</div>}
      </div>
    </div>
  );
}

function Attachment({a}){
  const [url,setUrl] = useState(null);
  useEffect(()=>{ db.storage.from('crm-attachments').createSignedUrl(a.storage_path,3600).then(({data})=>setUrl(data?.signedUrl)); },[a.storage_path]);
  const isImg = (a.content_type||'').startsWith('image/');
  if(isImg) return url ? <a href={url} target="_blank"><img src={url} className="h-24 rounded-lg border border-slate-200" /></a> : <div className="h-24 w-32 bg-slate-100 rounded-lg animate-pulse" />;
  return <a href={url} target="_blank" className="text-xs bg-slate-100 rounded px-2 py-1">📎 {a.filename}</a>;
}

// ---- Contacts ----
function Contacts({lead,onChange}){
  const [adding,setAdding] = useState(false);
  const [f,setF] = useState({name:'',title:'',phone:'',email:''});
  async function add(){
    if(!f.name && !f.email) return;
    const {data:c} = await db.from('crm_contacts').insert({lead_id:lead.id,name:f.name||null,title:f.title||null,phone:f.phone||null}).select('id').single();
    if(c && f.email) await db.from('crm_contact_emails').insert({contact_id:c.id,email:f.email.trim(),is_primary:true});
    setF({name:'',title:'',phone:'',email:''}); setAdding(false); onChange();
  }
  async function addEmail(c){ const e=prompt('Add email for '+(c.name||'contact')); if(e) { await db.from('crm_contact_emails').insert({contact_id:c.id,email:e.trim()}); onChange(); } }
  async function delContact(c){ if(confirm('Remove contact?')){ await db.from('crm_contacts').delete().eq('id',c.id); onChange(); } }

  return (
    <div className="p-4 space-y-3">
      {(lead.crm_contacts||[]).map(c=>(
        <div key={c.id} className="border border-slate-200 rounded-xl p-3 group">
          <div className="flex items-center justify-between">
            <div className="font-medium text-sm">{c.name||'(no name)'} {c.title && <span className="text-slate-400 font-normal">· {c.title}</span>}</div>
            <button onClick={()=>delContact(c)} className="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-rose-500 text-xs">remove</button>
          </div>
          {c.phone && <div className="text-xs text-slate-500 mt-0.5">📞 {c.phone}</div>}
          <div className="mt-1 flex flex-wrap gap-1.5 items-center">
            {(c.crm_contact_emails||[]).map(e=><a key={e.id} href={'mailto:'+e.email} className="text-xs bg-indigo-50 text-indigo-700 rounded px-2 py-0.5">{e.email}{e.is_primary?' ★':''}</a>)}
            <button onClick={()=>addEmail(c)} className="text-xs text-slate-400 hover:text-slate-600">+ email</button>
          </div>
        </div>
      ))}
      {adding ? (
        <div className="border border-indigo-200 rounded-xl p-3 space-y-2">
          {['name','title','phone','email'].map(k=>(
            <input key={k} placeholder={k[0].toUpperCase()+k.slice(1)} value={f[k]} onChange={e=>setF({...f,[k]:e.target.value})}
              className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-sm" />
          ))}
          <div className="flex gap-2 justify-end"><button onClick={()=>setAdding(false)} className="text-sm text-slate-500 px-2">Cancel</button>
            <button onClick={add} className="bg-indigo-600 text-white text-sm rounded-lg px-3 py-1.5">Save</button></div>
        </div>
      ) : <button onClick={()=>setAdding(true)} className="text-sm text-indigo-600">+ Add contact</button>}
      {(lead.crm_contacts||[]).length===0 && !adding && <div className="text-sm text-slate-300">No contacts yet. The email matcher uses these addresses.</div>}
    </div>
  );
}

// ---- Opportunities ----
function Opps({lead,onChange}){
  const [adding,setAdding] = useState(false);
  const [f,setF] = useState({name:'',value:'',status:'open'});
  async function add(){ if(!f.name) return; await db.from('crm_opportunities').insert({lead_id:lead.id,name:f.name,value:f.value?Number(f.value):null,status:f.status}); setF({name:'',value:'',status:'open'}); setAdding(false); onChange(); }
  async function patch(o,fields){ await db.from('crm_opportunities').update(fields).eq('id',o.id); onChange(); }
  async function del(o){ if(confirm('Delete opportunity?')){ await db.from('crm_opportunities').delete().eq('id',o.id); onChange(); } }
  return (
    <div className="p-4 space-y-3">
      {(lead.crm_opportunities||[]).map(o=>(
        <div key={o.id} className="border border-slate-200 rounded-xl p-3 group">
          <div className="flex items-center justify-between">
            <div className="font-medium text-sm">{o.name}</div>
            <button onClick={()=>del(o)} className="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-rose-500 text-xs">delete</button>
          </div>
          <div className="flex items-center gap-3 mt-1 text-sm">
            <span className="text-slate-600">{money(o.value)}</span>
            <select value={o.status} onChange={e=>patch(o,{status:e.target.value,closed_at:e.target.value==='open'?null:new Date().toISOString()})}
              className="text-xs border border-slate-200 rounded px-1.5 py-0.5">
              {['open','won','lost'].map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
        </div>
      ))}
      {adding ? (
        <div className="border border-indigo-200 rounded-xl p-3 space-y-2">
          <input placeholder="Opportunity name" value={f.name} onChange={e=>setF({...f,name:e.target.value})} className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-sm" />
          <input placeholder="Value ($)" type="number" value={f.value} onChange={e=>setF({...f,value:e.target.value})} className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-sm" />
          <div className="flex gap-2 justify-end"><button onClick={()=>setAdding(false)} className="text-sm text-slate-500 px-2">Cancel</button>
            <button onClick={add} className="bg-indigo-600 text-white text-sm rounded-lg px-3 py-1.5">Save</button></div>
        </div>
      ) : <button onClick={()=>setAdding(true)} className="text-sm text-indigo-600">+ Add opportunity</button>}
    </div>
  );
}

// =====================================================================
// Unsorted inbox (forwarded emails the matcher couldn't place)
// =====================================================================
function Unsorted({leads,onChange}){
  const [rows,setRows] = useState([]);
  const load = useCallback(async ()=>{ const {data}=await db.from('crm_unsorted_emails').select('*').eq('resolved',false).order('received_at',{ascending:false}); setRows(data||[]); },[]);
  useEffect(()=>{ load(); },[load]);

  async function assign(row, leadId){
    if(!leadId) return;
    await db.from('crm_activities').insert({
      lead_id:leadId, type:'email', body:row.body, email_subject:row.subject,
      email_from:row.from_email, email_direction:'inbound', occurred_at:row.received_at
    });
    await db.from('crm_unsorted_emails').update({resolved:true}).eq('id',row.id);
    load(); onChange();
  }
  return (
    <div className="p-4 max-w-3xl mx-auto">
      <p className="text-sm text-slate-500 mb-3">Forwarded emails whose sender didn’t match a contact. Assign one to a lead and it’s filed on that timeline.</p>
      <div className="space-y-2">
        {rows.map(r=>(
          <div key={r.id} className="bg-white border border-slate-200 rounded-xl p-3">
            <div className="text-sm font-medium">{r.subject||'(no subject)'}</div>
            <div className="text-xs text-slate-400">{r.from_name} &lt;{r.from_email}&gt; · {fmtDate(r.received_at)}</div>
            {r.body && <div className="text-sm text-slate-600 mt-1 line-clamp-3 whitespace-pre-wrap">{r.body.slice(0,300)}</div>}
            <select defaultValue="" onChange={e=>assign(r,e.target.value)} className="mt-2 text-sm border border-slate-300 rounded-lg px-2 py-1">
              <option value="">Assign to lead…</option>
              {leads.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
            </select>
          </div>
        ))}
        {rows.length===0 && <div className="text-center text-slate-300 py-10 text-sm">Nothing unsorted. 🎉</div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
