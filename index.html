<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Smile CRM</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🙂</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      // Brand palette — orange is "dark"/primary (remapped over indigo so all existing usages pick it up), yellow is the accent
      indigo: {50:'#fef0e6',100:'#fdd9c2',200:'#fbc4a3',300:'#f8a06d',400:'#f5803f',500:'#f25e0d',600:'#f25e0d',700:'#d24f06',800:'#a83e05',900:'#7c2e04'},
      brand: '#f25e0d',
      accent: '#fbde04'
    }}}};
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background:#f6f7f9; }
    .scroll-thin::-webkit-scrollbar{height:10px;width:10px}
    .scroll-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}
  </style>
</head>
<body>
  <div id="root" class="text-slate-800"></div>

  <script type="text/babel-source" id="app-src">
const { useState, useEffect, useCallback, useRef } = React;

// ---- Supabase client (publishable key is safe in the browser; RLS guards data) ----
const SUPABASE_URL = "https://awzjnxejacoflwsqvrmr.supabase.co";
const SUPABASE_KEY = "sb_publishable_02ogxC6Z2Yb5Qx9moQVUew_ow_hCMXI";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const fmtDate = (s) => s ? new Date(s).toLocaleString(undefined,{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}) : '';
const fmtDay  = (s) => s ? new Date(s).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}) : '';
const money   = (n) => (n||n===0) ? '$'+Number(n).toLocaleString() : '';
const dotClass = (s) => s.kind==='won' ? 'bg-emerald-500' : s.kind==='lost' ? 'bg-rose-400' : s.label==='Holding' ? 'bg-accent' : 'bg-brand';
// Turn any URLs in free text into clickable links that open in a new tab
function linkify(text){
  if(!text) return text;
  return text.split(/(https?:\/\/[^\s]+)/g).map((p,i)=>
    /^https?:\/\//.test(p)
      ? <a key={i} href={p} target="_blank" rel="noopener noreferrer" className="text-brand underline break-all">{p}</a>
      : p);
}

// =====================================================================
// Auth gate
// =====================================================================
function Auth() {
  const [email,setEmail] = useState('');
  const [pw,setPw] = useState('');
  const [mode,setMode] = useState('signin');
  const [msg,setMsg] = useState('');
  const [busy,setBusy] = useState(false);

  async function submit(e){
    e.preventDefault(); setBusy(true); setMsg('');
    try{
      if(mode==='signin'){
        const {error} = await db.auth.signInWithPassword({email,password:pw});
        if(error) throw error;
      } else {
        const {error} = await db.auth.signUp({email,password:pw});
        if(error) throw error;
        setMsg('Account created. If sign-in is blocked, ask Tim/Claude to confirm it, then sign in.');
        setMode('signin');
      }
    }catch(err){ setMsg(err.message||String(err)); }
    setBusy(false);
  }

  return (
    <div className="min-h-screen flex items-center justify-center p-4">
      <form onSubmit={submit} className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 w-full max-w-sm">
        <div className="flex justify-center mb-2"><div className="bg-accent rounded-xl w-12 h-12 flex items-center justify-center text-2xl">🙂</div></div>
        <h1 className="text-xl font-semibold text-center mb-6">Smile CRM</h1>
        <label className="block text-sm text-slate-600 mb-1">Email</label>
        <input className="w-full border border-slate-300 rounded-lg px-3 py-2 mb-3 focus:border-brand outline-none" type="email" value={email} onChange={e=>setEmail(e.target.value)} required />
        <label className="block text-sm text-slate-600 mb-1">Password</label>
        <input className="w-full border border-slate-300 rounded-lg px-3 py-2 mb-4 focus:border-brand outline-none" type="password" value={pw} onChange={e=>setPw(e.target.value)} required />
        <button disabled={busy} className="w-full bg-brand hover:bg-indigo-700 text-white rounded-lg py-2 font-medium disabled:opacity-50">
          {busy?'…':(mode==='signin'?'Sign in':'Create account')}
        </button>
        {msg && <p className="text-sm text-amber-700 mt-3">{msg}</p>}
        <p className="text-sm text-slate-500 mt-4 text-center">
          {mode==='signin'
            ? <>First time? <button type="button" className="text-brand font-medium" onClick={()=>setMode('signup')}>Create account</button></>
            : <>Have an account? <button type="button" className="text-brand font-medium" onClick={()=>setMode('signin')}>Sign in</button></>}
        </p>
      </form>
    </div>
  );
}

// =====================================================================
// Top level
// =====================================================================
function App(){
  const [session,setSession] = useState(undefined);
  useEffect(()=>{
    db.auth.getSession().then(({data})=>setSession(data.session));
    const {data:sub} = db.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);
  if(session===undefined) return <div className="min-h-screen flex items-center justify-center text-slate-400">Loading…</div>;
  if(!session) return <Auth/>;
  return <Main/>;
}

function Main(){
  const [view,setView] = useState('pipeline');
  const [statuses,setStatuses] = useState([]);
  const [leads,setLeads] = useState([]);
  const [opps,setOpps] = useState([]);
  const [contacts,setContacts] = useState([]);
  const [openLead,setOpenLead] = useState(null);
  const [openContact,setOpenContact] = useState(null);
  const [unsortedCount,setUnsortedCount] = useState(0);
  const [search,setSearch] = useState('');
  const [loading,setLoading] = useState(true);

  const load = useCallback(async ()=>{
    const [{data:st},{data:ld},{data:op},{data:ct},{count}] = await Promise.all([
      db.from('crm_pipeline_statuses').select('*').order('sort_order'),
      db.from('crm_leads').select('*, crm_contacts(id), crm_opportunities(id)').order('updated_at',{ascending:false}),
      db.from('crm_opportunities').select('*, status:crm_pipeline_statuses(*), lead:crm_leads(id,name)').order('updated_at',{ascending:false}),
      db.from('crm_contacts').select('*, crm_contact_emails(*), lead:crm_leads(id,name)').order('name'),
      db.from('crm_unsorted_emails').select('*',{count:'exact',head:true}).eq('resolved',false),
    ]);
    setStatuses(st||[]); setLeads(ld||[]); setOpps(op||[]); setContacts(ct||[]); setUnsortedCount(count||0); setLoading(false);
  },[]);
  useEffect(()=>{ load(); },[load]);

  const s = search.toLowerCase();
  const fLeads = leads.filter(l=> !s || l.name.toLowerCase().includes(s));
  const fContacts = contacts.filter(c=> !s ||
    (c.name||'').toLowerCase().includes(s) ||
    (c.title||'').toLowerCase().includes(s) ||
    (c.lead?.name||'').toLowerCase().includes(s) ||
    (c.crm_contact_emails||[]).some(e=>e.email.toLowerCase().includes(s)));
  const fOpps = opps.filter(o=> !s || o.name.toLowerCase().includes(s) || (o.lead?.name||'').toLowerCase().includes(s));

  const tabs = [['pipeline','Pipeline'],['list','Leads'],['contacts','Contacts'],['tasks','Tasks'],['unsorted','Unsorted'+(unsortedCount?` (${unsortedCount})`:'')]];

  return (
    <div className="min-h-screen flex flex-col">
      <header className="bg-white border-b-2 border-accent px-4 py-2.5 flex items-center gap-3 sticky top-0 z-20">
        <div className="bg-accent rounded-lg w-8 h-8 flex items-center justify-center text-lg">🙂</div>
        <div className="font-semibold mr-2">Smile CRM</div>
        <nav className="flex gap-1 text-sm">
          {tabs.map(([k,label])=>(
            <button key={k} onClick={()=>setView(k)}
              className={"px-3 py-1.5 rounded-lg "+(view===k?'bg-indigo-50 text-brand font-semibold':'text-slate-600 hover:bg-slate-100')}>{label}</button>
          ))}
        </nav>
        <div className="flex-1" />
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…"
          className="border border-slate-300 rounded-lg px-3 py-1.5 text-sm w-44 focus:w-60 focus:border-brand outline-none transition-all" />
        <button onClick={async()=>{
            const name = prompt('New lead — company name?'); if(!name) return;
            const {data} = await db.from('crm_leads').insert({name}).select('*').single();
            await load(); setOpenLead(data.id);
          }} className="bg-brand hover:bg-indigo-700 text-white text-sm rounded-lg px-3 py-1.5 font-medium">+ Lead</button>
        <button title="Change password" onClick={async()=>{
            const p = prompt('New password (min 6 characters):');
            if(p && p.length>=6){ const {error}=await db.auth.updateUser({password:p}); alert(error?('Error: '+error.message):'Password updated.'); }
            else if(p!==null){ alert('Password must be at least 6 characters.'); }
          }} className="text-slate-400 hover:text-slate-600 text-sm px-2">🔑</button>
        <button onClick={()=>db.auth.signOut()} className="text-slate-400 hover:text-slate-600 text-sm px-2">Sign out</button>
      </header>

      <main className="flex-1 min-h-0">
        {loading ? <div className="p-10 text-center text-slate-400">Loading…</div>
         : view==='pipeline' ? <Pipeline statuses={statuses} opps={fOpps} onOpenLead={setOpenLead} onChange={load}/>
         : view==='list' ? <LeadList leads={fLeads} onOpen={setOpenLead}/>
         : view==='contacts' ? <ContactsView contacts={fContacts} onOpen={setOpenContact}/>
         : view==='tasks' ? <TasksView search={search} onOpen={setOpenLead}/>
         : <Unsorted leads={leads} onChange={load}/>}
      </main>

      {openLead && <LeadDetail leadId={openLead} statuses={statuses} onClose={()=>setOpenLead(null)} onOpenContact={setOpenContact} onChange={load}/>}
      {openContact && <ContactDetail contactId={openContact} onClose={()=>setOpenContact(null)} onOpenLead={(id)=>{setOpenContact(null);setOpenLead(id);}} onChange={load}/>}
    </div>
  );
}

// =====================================================================
// Pipeline board — columns of OPPORTUNITIES
// =====================================================================
function Pipeline({statuses,opps,onOpenLead,onChange}){
  async function move(opp,status_id){
    const st = statuses.find(s=>s.id===status_id);
    await db.from('crm_opportunities').update({status_id, closed_at: (st && st.kind!=='active') ? new Date().toISOString() : null}).eq('id',opp.id);
    onChange();
  }
  return (
    <div className="h-full overflow-x-auto scroll-thin p-4">
      <div className="flex gap-4 min-w-max h-full">
        {statuses.map(s=>{
          const col = opps.filter(o=>o.status_id===s.id);
          const total = col.reduce((a,o)=>a+(Number(o.value)||0),0);
          return (
            <div key={s.id} className="w-72 flex-shrink-0 flex flex-col">
              <div className="flex items-center justify-between px-1 mb-2">
                <div className="font-medium text-sm flex items-center gap-2">
                  <span className={"w-2 h-2 rounded-full "+dotClass(s)}></span>{s.label}
                </div>
                <span className="text-xs text-slate-400">{col.length}{total?' · '+money(total):''}</span>
              </div>
              <div className="flex-1 space-y-2 overflow-y-auto scroll-thin pr-1">
                {col.map(o=>(
                  <div key={o.id} onClick={()=>onOpenLead(o.lead_id)}
                    className="bg-white rounded-xl border border-slate-200 p-3 cursor-pointer hover:border-brand hover:shadow-sm">
                    <div className="font-medium text-sm">{o.name}</div>
                    <div className="text-xs text-slate-500 mt-0.5">{o.lead?.name||'—'}{o.value?' · '+money(o.value):''}</div>
                    <select value={o.status_id} onClick={e=>e.stopPropagation()} onChange={e=>move(o,e.target.value)}
                      className="mt-2 text-xs border border-slate-200 rounded-md px-1.5 py-1 w-full text-slate-600">
                      {statuses.map(x=><option key={x.id} value={x.id}>{x.label}</option>)}
                    </select>
                  </div>
                ))}
                {col.length===0 && <div className="text-xs text-slate-300 px-1 py-4 text-center">—</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// =====================================================================
// Leads list (companies)
// =====================================================================
function LeadList({leads,onOpen}){
  return (
    <div className="p-4 max-w-4xl mx-auto">
      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-slate-500 text-left">
            <tr><th className="px-4 py-2 font-medium">Company</th><th className="px-4 py-2 font-medium">Contacts</th><th className="px-4 py-2 font-medium">Opportunities</th><th className="px-4 py-2 font-medium">Updated</th></tr>
          </thead>
          <tbody>
            {leads.map(l=>(
              <tr key={l.id} onClick={()=>onOpen(l.id)} className="border-t border-slate-100 hover:bg-slate-50 cursor-pointer">
                <td className="px-4 py-2.5 font-medium">{l.name}</td>
                <td className="px-4 py-2.5 text-slate-500">{l.crm_contacts?.length||0}</td>
                <td className="px-4 py-2.5 text-slate-500">{l.crm_opportunities?.length||0}</td>
                <td className="px-4 py-2.5 text-slate-400">{fmtDay(l.updated_at)}</td>
              </tr>
            ))}
            {leads.length===0 && <tr><td colSpan="4" className="px-4 py-10 text-center text-slate-300">No leads. Hit “+ Lead”.</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// =====================================================================
// Contacts view — everybody, across all companies, searchable
// =====================================================================
function ContactsView({contacts,onOpen}){
  return (
    <div className="p-4 max-w-4xl mx-auto">
      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-slate-500 text-left">
            <tr><th className="px-4 py-2 font-medium">Name</th><th className="px-4 py-2 font-medium">Company</th><th className="px-4 py-2 font-medium">Title</th><th className="px-4 py-2 font-medium">Emails</th></tr>
          </thead>
          <tbody>
            {contacts.map(c=>(
              <tr key={c.id} onClick={()=>onOpen(c.id)} className="border-t border-slate-100 hover:bg-slate-50 cursor-pointer">
                <td className="px-4 py-2.5 font-medium">{c.name||'(no name)'} {c.linkedin_url && <a href={c.linkedin_url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} className="text-brand text-xs font-normal">↗</a>}</td>
                <td className="px-4 py-2.5 text-slate-500">{c.lead?.name||'—'}</td>
                <td className="px-4 py-2.5 text-slate-500">{c.title||''}</td>
                <td className="px-4 py-2.5 text-slate-500">{(c.crm_contact_emails||[]).map(e=>e.email).join(', ')}</td>
              </tr>
            ))}
            {contacts.length===0 && <tr><td colSpan="4" className="px-4 py-10 text-center text-slate-300">No contacts yet.</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// =====================================================================
// Tasks view — every task across all companies & contacts
// =====================================================================
function TasksView({search,onOpen}){
  const [tasks,setTasks] = useState([]);
  const [showDone,setShowDone] = useState(false);
  const load = useCallback(async ()=>{
    const {data} = await db.from('crm_activities')
      .select('*, lead:crm_leads(id,name)').eq('type','task')
      .order('task_done').order('task_due_date',{nullsFirst:false});
    setTasks(data||[]);
  },[]);
  useEffect(()=>{ load(); },[load]);
  async function toggle(t){ await db.from('crm_activities').update({task_done:!t.task_done, task_done_at:t.task_done?null:new Date().toISOString()}).eq('id',t.id); load(); }

  const s = (search||'').toLowerCase();
  const today = new Date(); today.setHours(0,0,0,0);
  const filtered = tasks.filter(t=> (showDone||!t.task_done) && (!s || (t.body||'').toLowerCase().includes(s) || (t.lead?.name||'').toLowerCase().includes(s)));

  return (
    <div className="p-4 max-w-3xl mx-auto">
      <div className="flex items-center justify-between mb-3">
        <p className="text-sm text-slate-500">Every task across all companies & contacts.</p>
        <label className="text-sm text-slate-500 flex items-center gap-1.5"><input type="checkbox" checked={showDone} onChange={e=>setShowDone(e.target.checked)} /> show completed</label>
      </div>
      <div className="space-y-2">
        {filtered.map(t=>{
          const overdue = t.task_due_date && !t.task_done && new Date(t.task_due_date) < today;
          return (
            <div key={t.id} className="bg-white border border-slate-200 rounded-xl p-3 flex items-start gap-3">
              <input type="checkbox" checked={t.task_done} onChange={()=>toggle(t)} className="mt-1" />
              <div className="flex-1 min-w-0">
                <div className={"text-sm "+(t.task_done?'line-through text-slate-400':'')}>{t.body||'(no description)'}</div>
                <div className="text-xs mt-1 flex items-center gap-2">
                  <button onClick={()=>onOpen(t.lead_id)} className="text-brand font-medium">{t.lead?.name||'—'}</button>
                  {t.task_due_date
                    ? <span className={overdue?'text-rose-500 font-medium':'text-slate-400'}>{overdue?'overdue · ':'due '}{fmtDay(t.task_due_date)}</span>
                    : <span className="text-slate-300">no due date</span>}
                </div>
              </div>
            </div>
          );
        })}
        {filtered.length===0 && <div className="text-center text-slate-300 py-10 text-sm">No {showDone?'':'open '}tasks. 🎉</div>}
      </div>
    </div>
  );
}

// =====================================================================
// Drawer shell
// =====================================================================
function Drawer({children,onClose}){
  return (
    <div className="fixed inset-0 z-30 flex justify-end">
      <div className="absolute inset-0 bg-black/20" onClick={onClose}></div>
      <div className="relative bg-white w-full max-w-xl h-full shadow-xl flex flex-col">
        <button onClick={onClose} className="absolute -left-9 top-3 text-white/90 text-2xl hidden sm:block">×</button>
        {children}
      </div>
    </div>
  );
}

// =====================================================================
// Lead detail slide-over
// =====================================================================
function LeadDetail({leadId,statuses,onClose,onOpenContact,onChange}){
  const [lead,setLead] = useState(null);
  const [tab,setTab] = useState('timeline');

  const load = useCallback(async ()=>{
    const {data} = await db.from('crm_leads')
      .select('*, crm_contacts(*, crm_contact_emails(*)), crm_opportunities(*, status:crm_pipeline_statuses(*))')
      .eq('id',leadId).single();
    setLead(data);
  },[leadId]);
  useEffect(()=>{ load(); },[load]);

  async function patch(fields){ await db.from('crm_leads').update(fields).eq('id',leadId); await load(); onChange(); }

  if(!lead) return <Drawer onClose={onClose}><div className="p-6 text-slate-400">Loading…</div></Drawer>;

  return (
    <Drawer onClose={onClose}>
      <div className="p-5 border-b border-slate-200">
        <input defaultValue={lead.name} onBlur={e=>e.target.value!==lead.name && patch({name:e.target.value})}
          className="text-lg font-semibold w-full outline-none focus:border-b focus:border-brand" />
        <input defaultValue={lead.website||''} placeholder="website" onBlur={e=>e.target.value!==(lead.website||'')&&patch({website:e.target.value})}
          className="text-sm border border-slate-200 rounded-lg px-2 py-1 mt-2 w-full focus:border-brand outline-none" />
        <textarea defaultValue={lead.description||''} placeholder="Notes about this company…" onBlur={e=>e.target.value!==(lead.description||'')&&patch({description:e.target.value})}
          className="text-sm border border-slate-200 rounded-lg px-2 py-1.5 mt-2 w-full resize-none focus:border-brand outline-none" rows="2" />
      </div>

      <div className="flex border-b border-slate-200 text-sm">
        {[['timeline','Timeline'],['contacts','Contacts'],['opps','Opportunities']].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} className={"px-4 py-2.5 "+(tab===k?'border-b-2 border-brand text-brand font-semibold':'text-slate-500')}>{l}</button>
        ))}
      </div>

      <div className="flex-1 overflow-y-auto scroll-thin">
        {tab==='timeline' && <Timeline leadId={lead.id} onChange={()=>{load();onChange();}}/>}
        {tab==='contacts' && <Contacts lead={lead} onChange={load} onOpenContact={onOpenContact}/>}
        {tab==='opps' && <Opps lead={lead} statuses={statuses} onChange={()=>{load();onChange();}}/>}
      </div>
    </Drawer>
  );
}

// =====================================================================
// Contact detail slide-over — info, emails, and notes about this person
// =====================================================================
function ContactDetail({contactId,onClose,onOpenLead,onChange}){
  const [c,setC] = useState(null);
  const load = useCallback(async ()=>{
    const {data} = await db.from('crm_contacts').select('*, crm_contact_emails(*), lead:crm_leads(id,name)').eq('id',contactId).single();
    setC(data);
  },[contactId]);
  useEffect(()=>{ load(); },[load]);

  async function patch(fields){ await db.from('crm_contacts').update(fields).eq('id',contactId); await load(); onChange&&onChange(); }
  async function addEmail(){ const e=prompt('Add email'); if(e){ await db.from('crm_contact_emails').insert({contact_id:contactId,email:e.trim()}); load(); onChange&&onChange(); } }

  if(!c) return <Drawer onClose={onClose}><div className="p-6 text-slate-400">Loading…</div></Drawer>;

  return (
    <Drawer onClose={onClose}>
      <div className="p-5 border-b border-slate-200">
        <input defaultValue={c.name||''} placeholder="Name" onBlur={e=>e.target.value!==(c.name||'')&&patch({name:e.target.value})}
          className="text-lg font-semibold w-full outline-none focus:border-b focus:border-brand" />
        <div className="flex gap-2 mt-2">
          <input defaultValue={c.title||''} placeholder="Title" onBlur={e=>e.target.value!==(c.title||'')&&patch({title:e.target.value})}
            className="text-sm border border-slate-200 rounded-lg px-2 py-1 flex-1 focus:border-brand outline-none" />
          <input defaultValue={c.phone||''} placeholder="Phone" onBlur={e=>e.target.value!==(c.phone||'')&&patch({phone:e.target.value})}
            className="text-sm border border-slate-200 rounded-lg px-2 py-1 flex-1 focus:border-brand outline-none" />
        </div>
        <div className="text-sm text-slate-500 mt-2">
          at <button className="text-brand font-medium" onClick={()=>onOpenLead(c.lead_id)}>{c.lead?.name||'—'}</button>
        </div>
        <div className="flex items-center gap-2 mt-2">
          <span className="text-sm text-slate-400">in</span>
          <input defaultValue={c.linkedin_url||''} placeholder="LinkedIn profile URL" onBlur={e=>e.target.value!==(c.linkedin_url||'')&&patch({linkedin_url:e.target.value})}
            className="text-sm border border-slate-200 rounded-lg px-2 py-1 flex-1 focus:border-brand outline-none" />
          {c.linkedin_url && <a href={c.linkedin_url} target="_blank" rel="noopener noreferrer" className="text-sm text-brand font-medium whitespace-nowrap">Open ↗</a>}
        </div>
        <div className="mt-2 flex flex-wrap gap-1.5 items-center">
          {(c.crm_contact_emails||[]).map(e=><a key={e.id} href={'mailto:'+e.email} className="text-xs bg-indigo-50 text-brand rounded px-2 py-0.5">{e.email}{e.is_primary?' ★':''}</a>)}
          <button onClick={addEmail} className="text-xs text-slate-400 hover:text-slate-600">+ email</button>
        </div>
      </div>
      <div className="px-4 py-2 text-xs uppercase tracking-wide text-slate-400 border-b border-slate-100">Notes about {c.name||'this contact'}</div>
      <div className="flex-1 overflow-y-auto scroll-thin">
        <Timeline leadId={c.lead_id} contactId={c.id} onChange={onChange}/>
      </div>
    </Drawer>
  );
}

// =====================================================================
// Timeline — reusable. Lead-scoped, or contact-scoped when contactId is set.
// =====================================================================
function Timeline({leadId,contactId,onChange}){
  const [items,setItems] = useState([]);
  const [mode,setMode] = useState('note');
  const [body,setBody] = useState('');
  const [due,setDue] = useState('');
  const [pending,setPending] = useState([]);
  const [busy,setBusy] = useState(false);
  const fileRef = useRef();
  const [editId,setEditId] = useState(null);
  const [editBody,setEditBody] = useState('');
  const [editSubject,setEditSubject] = useState('');
  const [editDue,setEditDue] = useState('');

  const load = useCallback(async ()=>{
    let q = db.from('crm_activities').select('*, crm_attachments(*)').order('occurred_at',{ascending:false});
    q = contactId ? q.eq('contact_id',contactId) : q.eq('lead_id',leadId);
    const {data} = await q;
    setItems(data||[]);
  },[leadId,contactId]);
  useEffect(()=>{ load(); },[load]);

  async function uploadFile(file){
    const path = `${leadId}/${Date.now()}-${Math.round(Math.random()*1e6)}-${(file.name||'paste.png').replace(/[^\w.\-]/g,'_')}`;
    const {error} = await db.storage.from('crm-attachments').upload(path,file,{contentType:file.type||'image/png'});
    if(error){ alert('Upload failed: '+error.message); return null; }
    return {storage_path:path, filename:file.name||'pasted-image.png', content_type:file.type||'image/png', size_bytes:file.size};
  }
  function onPaste(e){
    const imgs = [...(e.clipboardData?.items||[])].filter(i=>i.type.startsWith('image/'));
    if(imgs.length){ e.preventDefault(); imgs.forEach(async i=>{ const f=i.getAsFile(); if(f){ const a=await uploadFile(f); if(a) setPending(p=>[...p,a]); } }); }
  }
  async function onPick(e){ for(const f of e.target.files){ const a=await uploadFile(f); if(a) setPending(p=>[...p,a]); } e.target.value=''; }

  async function save(){
    if(mode==='task' && !body.trim()) return;
    if(mode!=='task' && !body.trim() && pending.length===0) return;
    setBusy(true);
    const row = { lead_id:leadId, contact_id:contactId||null, type:mode, body:body.trim()||null, occurred_at:new Date().toISOString() };
    if(mode==='task' && due) row.task_due_date = due;
    const {data:act} = await db.from('crm_activities').insert(row).select('id').single();
    if(act && pending.length) await db.from('crm_attachments').insert(pending.map(a=>({...a,activity_id:act.id})));
    setBody(''); setDue(''); setPending([]); setBusy(false);
    await load(); onChange&&onChange();
  }
  async function toggleTask(it){ await db.from('crm_activities').update({task_done:!it.task_done, task_done_at: it.task_done?null:new Date().toISOString()}).eq('id',it.id); load(); }
  async function del(it){ if(confirm('Delete this entry?')){ await db.from('crm_activities').delete().eq('id',it.id); load(); onChange&&onChange(); } }
  function startEdit(it){ setEditId(it.id); setEditBody(it.body||''); setEditSubject(it.email_subject||''); setEditDue(it.task_due_date||''); }
  async function saveEdit(it){
    const fields = { body: editBody };
    if(it.type==='email') fields.email_subject = editSubject||null;
    if(it.type==='task') fields.task_due_date = editDue||null;
    await db.from('crm_activities').update(fields).eq('id',it.id);
    setEditId(null); await load(); onChange&&onChange();
  }

  const icon = {note:'📝',email:'✉️',task:'✅'};

  return (
    <div className="p-4">
      <div className="border border-slate-200 rounded-xl p-3 mb-4 bg-slate-50/50">
        <div className="flex gap-1 mb-2 text-sm">
          {[['note','Note'],['task','Task']].map(([k,l])=>(
            <button key={k} onClick={()=>setMode(k)} className={"px-2.5 py-1 rounded-md "+(mode===k?'bg-white border border-slate-300 font-medium':'text-slate-500')}>{l}</button>
          ))}
        </div>
        <textarea value={body} onChange={e=>setBody(e.target.value)} onPaste={onPaste}
          placeholder={mode==='task'?'Task — what needs doing?':'Write a note… (paste a screenshot to attach)'}
          className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm resize-none focus:border-brand outline-none" rows="3" />
        {pending.length>0 && <div className="flex gap-2 flex-wrap mt-2">{pending.map((a,i)=><span key={i} className="text-xs bg-indigo-50 text-brand rounded px-2 py-1">📎 {a.filename}</span>)}</div>}
        <div className="flex items-center gap-2 mt-2">
          {mode==='task' && <input type="date" value={due} onChange={e=>setDue(e.target.value)} className="text-sm border border-slate-200 rounded-lg px-2 py-1" />}
          <button onClick={()=>fileRef.current.click()} className="text-sm text-slate-500 hover:text-slate-700">📎 Attach</button>
          <input ref={fileRef} type="file" multiple accept="image/*" className="hidden" onChange={onPick} />
          <div className="flex-1" />
          <button onClick={save} disabled={busy} className="bg-brand hover:bg-indigo-700 text-white text-sm rounded-lg px-3 py-1.5 font-medium disabled:opacity-50">{busy?'Saving…':'Add'}</button>
        </div>
      </div>

      <div className="space-y-3">
        {items.map(it=>(
          <div key={it.id} className="flex gap-3 group">
            <div className="text-lg leading-none mt-0.5">{icon[it.type]}</div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 text-xs text-slate-400">
                <span className="capitalize">{it.type}</span><span>·</span><span>{fmtDate(it.occurred_at)}</span>
                {it.type==='task' && <label className="flex items-center gap-1 ml-1 text-slate-500"><input type="checkbox" checked={it.task_done} onChange={()=>toggleTask(it)} />{it.task_done?'done':(it.task_due_date?('due '+fmtDay(it.task_due_date)):'open')}</label>}
                <span className="ml-auto flex items-center gap-2">
                  {editId!==it.id && <button onClick={()=>startEdit(it)} className="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-brand">edit</button>}
                  <button onClick={()=>del(it)} className="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-rose-500">delete</button>
                </span>
              </div>
              {editId===it.id ? (
                <div className="mt-1 space-y-2">
                  {it.type==='email' && <input value={editSubject} onChange={e=>setEditSubject(e.target.value)} placeholder="Subject" className="w-full border border-slate-200 rounded-lg px-2 py-1 text-sm focus:border-brand outline-none" />}
                  <textarea value={editBody} onChange={e=>setEditBody(e.target.value)} className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-sm focus:border-brand outline-none" rows="6" />
                  <div className="flex items-center gap-2">
                    {it.type==='task' && <input type="date" value={editDue} onChange={e=>setEditDue(e.target.value)} className="text-sm border border-slate-200 rounded-lg px-2 py-1" />}
                    <div className="flex-1" />
                    <button onClick={()=>setEditId(null)} className="text-sm text-slate-500 px-2">Cancel</button>
                    <button onClick={()=>saveEdit(it)} className="bg-brand text-white text-sm rounded-lg px-3 py-1.5">Save</button>
                  </div>
                </div>
              ) : (
                <React.Fragment>
                  {it.type==='email' && it.email_subject && <div className="text-sm font-medium mt-0.5">{it.email_subject}</div>}
                  {it.type==='email' && <div className="text-xs text-slate-400">{it.email_from} {it.email_direction==='outbound'?'→':'←'} {it.email_to}</div>}
                  {it.body && <div className={"text-sm whitespace-pre-wrap mt-0.5 "+(it.task_done?'line-through text-slate-400':'')}>{linkify(it.body)}</div>}
                  {it.crm_attachments?.length>0 && <div className="flex gap-2 flex-wrap mt-2">{it.crm_attachments.map(a=><Attachment key={a.id} a={a}/>)}</div>}
                </React.Fragment>
              )}
            </div>
          </div>
        ))}
        {items.length===0 && <div className="text-center text-slate-300 py-8 text-sm">No activity yet.</div>}
      </div>
    </div>
  );
}

function Attachment({a}){
  const [url,setUrl] = useState(null);
  useEffect(()=>{ db.storage.from('crm-attachments').createSignedUrl(a.storage_path,3600).then(({data})=>setUrl(data?.signedUrl)); },[a.storage_path]);
  const isImg = (a.content_type||'').startsWith('image/');
  if(isImg) return url ? <a href={url} target="_blank"><img src={url} className="h-24 rounded-lg border border-slate-200" /></a> : <div className="h-24 w-32 bg-slate-100 rounded-lg animate-pulse" />;
  return <a href={url} target="_blank" className="text-xs bg-slate-100 rounded px-2 py-1">📎 {a.filename}</a>;
}

// ---- Contacts sub-tab inside a Lead ----
function Contacts({lead,onChange,onOpenContact}){
  const [adding,setAdding] = useState(false);
  const [f,setF] = useState({name:'',title:'',phone:'',email:'',linkedin:''});
  async function add(){
    if(!f.name && !f.email) return;
    const {data:c} = await db.from('crm_contacts').insert({lead_id:lead.id,name:f.name||null,title:f.title||null,phone:f.phone||null,linkedin_url:f.linkedin||null}).select('id').single();
    if(c && f.email) await db.from('crm_contact_emails').insert({contact_id:c.id,email:f.email.trim(),is_primary:true});
    setF({name:'',title:'',phone:'',email:'',linkedin:''}); setAdding(false); onChange();
  }
  async function delContact(c){ if(confirm('Remove contact?')){ await db.from('crm_contacts').delete().eq('id',c.id); onChange(); } }

  return (
    <div className="p-4 space-y-3">
      {(lead.crm_contacts||[]).map(c=>(
        <div key={c.id} className="border border-slate-200 rounded-xl p-3 group hover:border-brand">
          <div className="flex items-center justify-between">
            <button onClick={()=>onOpenContact(c.id)} className="font-medium text-sm text-left hover:text-brand">{c.name||'(no name)'} {c.title && <span className="text-slate-400 font-normal">· {c.title}</span>}</button>
            <button onClick={()=>delContact(c)} className="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-rose-500 text-xs">remove</button>
          </div>
          {c.phone && <div className="text-xs text-slate-500 mt-0.5">📞 {c.phone}</div>}
          <div className="mt-1 flex flex-wrap gap-1.5 items-center">
            {(c.crm_contact_emails||[]).map(e=><span key={e.id} className="text-xs bg-indigo-50 text-brand rounded px-2 py-0.5">{e.email}{e.is_primary?' ★':''}</span>)}
            <button onClick={()=>onOpenContact(c.id)} className="text-xs text-slate-400 hover:text-brand">open ›</button>
          </div>
        </div>
      ))}
      {adding ? (
        <div className="border border-brand/40 rounded-xl p-3 space-y-2">
          {[['name','Name'],['title','Title'],['phone','Phone'],['email','Email'],['linkedin','LinkedIn profile URL']].map(([k,label])=>(
            <input key={k} placeholder={label} value={f[k]} onChange={e=>setF({...f,[k]:e.target.value})}
              className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-sm focus:border-brand outline-none" />
          ))}
          <div className="flex gap-2 justify-end"><button onClick={()=>setAdding(false)} className="text-sm text-slate-500 px-2">Cancel</button>
            <button onClick={add} className="bg-brand text-white text-sm rounded-lg px-3 py-1.5">Save</button></div>
        </div>
      ) : <button onClick={()=>setAdding(true)} className="text-sm text-brand font-medium">+ Add contact</button>}
      {(lead.crm_contacts||[]).length===0 && !adding && <div className="text-sm text-slate-300">No contacts yet. The email matcher uses these addresses.</div>}
    </div>
  );
}

// ---- Opportunities sub-tab inside a Lead (carries the pipeline stage) ----
function Opps({lead,statuses,onChange}){
  const [adding,setAdding] = useState(false);
  const [f,setF] = useState({name:'',value:''});
  async function add(){
    if(!f.name) return;
    const def = statuses[0]?.id;
    await db.from('crm_opportunities').insert({lead_id:lead.id,name:f.name,value:f.value?Number(f.value):null,status_id:def});
    setF({name:'',value:''}); setAdding(false); onChange();
  }
  async function patch(o,fields){ await db.from('crm_opportunities').update(fields).eq('id',o.id); onChange(); }
  async function del(o){ if(confirm('Delete opportunity?')){ await db.from('crm_opportunities').delete().eq('id',o.id); onChange(); } }
  return (
    <div className="p-4 space-y-3">
      {(lead.crm_opportunities||[]).map(o=>(
        <div key={o.id} className="border border-slate-200 rounded-xl p-3 group">
          <div className="flex items-center justify-between">
            <div className="font-medium text-sm">{o.name}</div>
            <button onClick={()=>del(o)} className="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-rose-500 text-xs">delete</button>
          </div>
          <div className="flex items-center gap-2 mt-1.5 text-sm">
            <span className="text-slate-600">{money(o.value)}</span>
            <select value={o.status_id||''} onChange={e=>{ const st=statuses.find(s=>s.id===e.target.value); patch(o,{status_id:e.target.value, closed_at:(st&&st.kind!=='active')?new Date().toISOString():null}); }}
              className="text-xs border border-slate-200 rounded px-1.5 py-1">
              {statuses.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
            </select>
          </div>
        </div>
      ))}
      {adding ? (
        <div className="border border-brand/40 rounded-xl p-3 space-y-2">
          <input placeholder="Opportunity name" value={f.name} onChange={e=>setF({...f,name:e.target.value})} className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-sm focus:border-brand outline-none" />
          <input placeholder="Value ($)" type="number" value={f.value} onChange={e=>setF({...f,value:e.target.value})} className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-sm focus:border-brand outline-none" />
          <div className="flex gap-2 justify-end"><button onClick={()=>setAdding(false)} className="text-sm text-slate-500 px-2">Cancel</button>
            <button onClick={add} className="bg-brand text-white text-sm rounded-lg px-3 py-1.5">Save</button></div>
        </div>
      ) : <button onClick={()=>setAdding(true)} className="text-sm text-brand font-medium">+ Add opportunity</button>}
      {(lead.crm_opportunities||[]).length===0 && !adding && <div className="text-sm text-slate-300">No opportunities yet. These are what move through your pipeline.</div>}
    </div>
  );
}

// =====================================================================
// Unsorted inbox (forwarded emails the matcher couldn't place)
// =====================================================================
function Unsorted({leads,onChange}){
  const [rows,setRows] = useState([]);
  const load = useCallback(async ()=>{ const {data}=await db.from('crm_unsorted_emails').select('*').eq('resolved',false).order('received_at',{ascending:false}); setRows(data||[]); },[]);
  useEffect(()=>{ load(); },[load]);
  async function assign(row, leadId){
    if(!leadId) return;
    await db.from('crm_activities').insert({ lead_id:leadId, type:'email', body:row.body, email_subject:row.subject, email_from:row.from_email, email_direction:'inbound', occurred_at:row.received_at });
    await db.from('crm_unsorted_emails').update({resolved:true}).eq('id',row.id);
    load(); onChange();
  }
  return (
    <div className="p-4 max-w-3xl mx-auto">
      <p className="text-sm text-slate-500 mb-3">Forwarded emails whose sender didn’t match a contact. Assign one to a lead and it’s filed on that timeline.</p>
      <div className="space-y-2">
        {rows.map(r=>(
          <div key={r.id} className="bg-white border border-slate-200 rounded-xl p-3">
            <div className="text-sm font-medium">{r.subject||'(no subject)'}</div>
            <div className="text-xs text-slate-400">{r.from_name} &lt;{r.from_email}&gt; · {fmtDate(r.received_at)}</div>
            {r.body && <div className="text-sm text-slate-600 mt-1 whitespace-pre-wrap">{r.body.slice(0,300)}</div>}
            <select defaultValue="" onChange={e=>assign(r,e.target.value)} className="mt-2 text-sm border border-slate-300 rounded-lg px-2 py-1">
              <option value="">Assign to lead…</option>
              {leads.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
            </select>
          </div>
        ))}
        {rows.length===0 && <div className="text-center text-slate-300 py-10 text-sm">Nothing unsorted. 🎉</div>}
      </div>
    </div>
  );
}
